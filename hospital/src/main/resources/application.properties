spring.application.name=hospital

# PostgreSQL config (Clustered / Env Vars support)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DB_USER:hospital_user}
spring.datasource.password=${DB_PASSWORD:hospital_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.packagesToScan=hospital.model

# Logging
logging.file.name=logs/hospital.log
logging.level.com.gruposiete=INFO

# Actuator
management.endpoints.web.exposure.include=logfile,health

# Node Configuration
node.id=${NODE_ID:auto}

# Cluster Configuration
cluster.peers=${CLUSTER_PEERS:192.168.1.1,192.168.1.2,192.168.1.3,192.168.1.4,192.168.1.5}
cluster.port=9000
time.server.id=${TIME_SERVER_ID:5}
